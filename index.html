<!DOCTYPE html>
<html lang="es" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Universal</title>
    <!-- Favicon para que se muestre el logo en la pestaña del navegador -->
    <link rel="icon" type="image/png" href="logo.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<!-- VIDEO DE FONDO PERMANENTE Y CAPA DE CONTRASTE -->
<video autoplay loop muted playsinline class="video-background">
    <!-- Buscará primero tu archivo de video local en tu proyecto -->
    <source src="video.mp4" type="video/mp4">

</video>
<div class="video-overlay"></div>

<body class="antialiased min-h-screen flex flex-col justify-between selection:bg-indigo-500/30 selection:text-white">

    <!-- PRE-LOADER ANIMADO -->
    <div id="preloader" class="preloader-container">
        <!-- Resplandor ambiental de fondo del loader -->
        <div class="absolute inset-0 -z-10 overflow-hidden pointer-events-none">
            <div
                class="absolute top-[35%] left-[35%] w-[300px] h-[300px] rounded-full bg-indigo-500/5 blur-[100px] animate-pulse">
            </div>
        </div>
        <!-- Estructura del Loader -->
        <div class="loader-ring">
            <img src="logo.png" alt="Cargando..." class="loader-logo">
        </div>
        <span class="loader-text">Conversor Universal</span>
        <!-- VIDEO DE FONDO 4K Y CAPA DE CONTRASTE -->
        <video autoplay loop muted playsinline class="video-background">
            <!-- Primero intentará cargar tu archivo local si lo colocas en tu carpeta -->
            <source src="video.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <!-- El resto de tu código HTML habitual (Blobs, Header, Main, etc.) -->

    <!-- Header con el Logo Limpio y Sin Caja -->
    <header
        class="w-full max-w-5xl mx-auto px-6 py-6 flex flex-col md:flex-row gap-4 justify-between items-center border-b border-white/5 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <!-- El logo ahora flota de manera transparente y sin caja -->
            <img src="logo.png" alt="Conversor Universal"
                class="h-10 w-auto object-contain spring-transition hover:opacity-80">
            <div>
                <span class="font-mono text-[9px] uppercase tracking-widest text-zinc-500">Módulo de Magnitudes</span>
                <h1 class="text-sm font-semibold tracking-tight text-zinc-100">Conversor Universal</h1>
            </div>
        </div>

        <nav
            class="flex flex-wrap items-center justify-center gap-1.5 bg-zinc-950/80 p-1 rounded-xl border border-white/5 shadow-inner">
            <a href="index.html"
                class="text-xs font-medium px-3.5 py-2 rounded-lg transition-all text-zinc-400 hover:text-zinc-100">
                Conversor
            </a>
            <a href="galea.html"
                class="text-xs font-medium px-3.5 py-2 rounded-lg transition-all text-zinc-400 hover:text-zinc-100">
                Método de Galera
            </a>
            <a href="formulas.html"
                class="text-xs font-medium px-3.5 py-2 rounded-lg transition-all text-zinc-400 hover:text-zinc-100">
                Fórmulas
            </a>
            <a href="geograficos.html"
                class="text-xs font-medium px-3.5 py-2 rounded-lg transition-all text-zinc-400 hover:text-zinc-100">
                Geográficos
            </a>
            <a href="geometria.html"
                class="text-xs font-medium px-3.5 py-2 rounded-lg transition-all text-zinc-400 hover:text-zinc-100">
                Geometría
            </a>
            <a href="develops.html"
                class="text-xs font-medium px-3.5 py-2 rounded-lg transition-all text-zinc-400 hover:text-zinc-100">
                Develops
            </a>
        </nav>
    </header>

    <!-- Contenedor Principal del Conversor -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div
            class="w-full max-w-lg glass-card rounded-2xl p-6 md:p-8 shadow-2xl relative overflow-hidden animate-fade-in">
            <div class="absolute top-0 inset-x-0 h-px bg-gradient-to-r from-transparent via-white/10 to-transparent">
            </div>

            <!-- Selector de Categorías -->
            <div class="grid grid-cols-4 gap-1 mb-8 bg-zinc-950/60 p-1 rounded-xl border border-white/5">
                <button data-category="length"
                    class="category-btn active-tab flex flex-col items-center gap-1.5 py-2.5 rounded-lg transition-all duration-300">
                    <i data-lucide="ruler" class="w-4 h-4"></i>
                    <span class="text-[10px] font-medium">Distancia</span>
                </button>
                <button data-category="mass"
                    class="category-btn flex flex-col items-center gap-1.5 py-2.5 rounded-lg transition-all duration-300">
                    <i data-lucide="dumbbell" class="w-4 h-4 text-zinc-500"></i>
                    <span class="text-[10px] font-medium text-zinc-500">Masa</span>
                </button>
                <button data-category="energy"
                    class="category-btn flex flex-col items-center gap-1.5 py-2.5 rounded-lg transition-all duration-300">
                    <i data-lucide="zap" class="w-4 h-4 text-zinc-500"></i>
                    <span class="text-[10px] font-medium text-zinc-500">Energía</span>
                </button>
                <button data-category="data"
                    class="category-btn flex flex-col items-center gap-1.5 py-2.5 rounded-lg transition-all duration-300">
                    <i data-lucide="database" class="w-4 h-4 text-zinc-500"></i>
                    <span class="text-[10px] font-medium text-zinc-500">Datos</span>
                </button>
            </div>

            <!-- Interfaz Interactiva -->
            <div class="space-y-4">

                <!-- Input Card -->
                <div class="bg-zinc-950/45 border border-white/5 p-4 rounded-xl transition-all duration-300 focus-glow">
                    <div class="flex justify-between items-center mb-2.5">
                        <label class="text-[9px] font-mono text-zinc-500 uppercase tracking-wider">Entrada</label>
                        <select id="prefix-from"
                            class="bg-zinc-900 text-xs text-zinc-300 border border-white/10 rounded-lg px-2 py-1 focus:outline-none focus:border-zinc-700"></select>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="number" id="val-input" value="1" placeholder="0.00"
                            class="bg-transparent text-3xl font-light w-full focus:outline-none text-zinc-100 placeholder:text-zinc-700 font-sans">
                        <span id="unit-symbol-from"
                            class="text-sm font-mono text-indigo-400 font-semibold min-w-[45px] text-right">nm</span>
                    </div>
                </div>

                <!-- Swap Button -->
                <div class="flex justify-center -my-2.5 relative z-10">
                    <button id="btn-swap"
                        class="w-9 h-9 rounded-full bg-zinc-900 border border-white/10 flex items-center justify-center hover:border-zinc-700 active:scale-95 transition-all duration-300 cursor-pointer shadow-xl">
                        <i data-lucide="arrow-up-down" class="w-4 h-4 text-zinc-400"></i>
                    </button>
                </div>

                <!-- Output Card -->
                <div class="bg-zinc-950/20 border border-white/5 p-4 rounded-xl">
                    <div class="flex justify-between items-center mb-2.5">
                        <label class="text-[9px] font-mono text-zinc-500 uppercase tracking-wider">Resultado</label>
                        <select id="prefix-to"
                            class="bg-zinc-900 text-xs text-zinc-300 border border-white/10 rounded-lg px-2 py-1 focus:outline-none focus:border-zinc-700"></select>
                    </div>
                    <div class="flex items-center gap-4">
                        <div id="val-output" class="text-3xl font-light text-zinc-100 truncate w-full font-sans">1.00000
                        </div>
                        <span id="unit-symbol-to"
                            class="text-sm font-mono text-violet-400 font-semibold min-w-[45px] text-right">Pm</span>
                    </div>

                    <!-- Módulo de Notación Científica -->
                    <div class="mt-4 pt-3 border-t border-white/5 flex justify-between items-center text-[11px]">
                        <span class="text-zinc-500 font-mono">Notación Científica:</span>
                        <span id="scientific-output"
                            class="font-mono text-zinc-300 bg-zinc-950 px-2 py-1 rounded border border-white/5"></span>
                    </div>
                </div>

                <!-- Contexto de Escala Real -->
                <div id="comparison-card"
                    class="bg-zinc-950/40 border border-white/5 p-3.5 rounded-xl flex items-start gap-3">
                    <div class="p-1.5 rounded bg-zinc-900 border border-white/5 text-zinc-500">
                        <i data-lucide="info" class="w-3.5 h-3.5"></i>
                    </div>
                    <div>
                        <h4 class="text-[9px] font-semibold text-zinc-400 mb-0.5 font-mono uppercase tracking-wide">
                            Equivalencia Espacial</h4>
                        <p id="comparison-text" class="text-xs text-zinc-400 leading-relaxed font-light">
                            Ingresa un valor para calcular su proporción real.
                        </p>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full text-center py-6 border-t border-white/5 text-[10px] text-zinc-600 font-mono">
        &copy; 2026 Conversor Universal. Todos los derechos reservados.
    </footer>

    <script src="conversions.js" type="module"></script>
    <script src="app.js" type="module"></script>
    <!-- Script de control del Preloader (Temporizador de 10 segundos) -->
    <script>
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                // Forzar una espera de 10 segundos (10000 ms) antes de iniciar la salida
                setTimeout(() => {
                    preloader.classList.add('preloader-hidden');

                    // Remueve el elemento del DOM tras terminar la animación de desvanecimiento CSS (750ms)
                    setTimeout(() => {
                        preloader.remove();
                    }, 750);
                }, 5000);
            }
        });
    </script>
</body>

</html>
